name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: render · tests · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --quiet pyyaml boto3 pytest ruff

      - name: Render manifest (validates the single source of truth)
        run: python lib/engine/render.py agents/pharmacovigilance/manifest.yaml "$RUNNER_TEMP/build"

      - name: Unit tests + eval/regression harness
        run: python -m pytest tests/ -q

      - name: Lint (bug-class checks)
        run: ruff check --select E9,F63,F7,F82 agents lib tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: render · tests · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Governance-core integrity (P0-9 - no drift from the pinned core version)
        run: python lib/verify_core.py

      - name: Install tooling
        run: python -m pip install --quiet "pyyaml==6.0.3" "boto3==1.43.51" "pytest==9.1.1" "ruff==0.15.22"

      - name: Render manifest (validates the single source of truth)
        run: python lib/engine/render.py agents/pharmacovigilance/manifest.yaml "$RUNNER_TEMP/build"

      - name: Unit tests + eval/regression harness
        run: python -m pytest tests/ -q

      - name: Lint (bug-class checks)
        run: ruff check --select E9,F63,F7,F82 agents lib tests

  supply-chain:
    name: dependency audit · SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install supply-chain tooling (pinned)
        run: python -m pip install --quiet "pip-audit==2.10.1" "cyclonedx-bom==7.3.0"

      - name: Audit runtime dependencies for known vulnerabilities (P0-8)
        run: pip-audit -r lib/runtime/requirements.txt

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py requirements lib/runtime/requirements.txt > sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.repository.name }}
          path: sbom.cyclonedx.json
